[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ez-pixel"
version = "0.1.0"
description = "Universal error tracking SDK for Python"
readme = "README.md"
license = "MIT"
requires-python = ">=3.8"
authors = [{ name = "Prestyj" }]
keywords = ["error-tracking", "monitoring", "crash-reporting", "pixel"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Monitoring",
]

[project.urls]
Homepage = "https://github.com/Gahroot/ezcoder"
Issues = "https://github.com/Gahroot/ezcoder/issues"
Repository = "https://github.com/Gahroot/ezcoder/tree/main/packages/pixel-python"

[tool.hatch.build.targets.wheel]
packages = ["src/ez_pixel"]

[tool.pytest.ini_options]
testpaths = ["tests"]
