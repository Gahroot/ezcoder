packages:
  - "packages/*"
  - "Matey"
  - "ezcoder-app"
  - "experiments/*"

# pnpm 10+ reads these settings from pnpm-workspace.yaml, not the package.json
# "pnpm" key. They mirror that key so the committed lockfile stays reproducible
# under --frozen-lockfile (CI) and the ink patches actually apply on install.
overrides:
  global-agent: ^4.1.3
  ip-address: ^10.1.1

patchedDependencies:
  ink@6.8.0: patches/ink@6.8.0.patch
  ink@7.0.2: patches/ink@7.0.2.patch

# Native deps allowed to run install scripts. pnpm 11 errors
# (ERR_PNPM_IGNORED_BUILDS) when a dep wants to build but isn't approved here, so
# this list must stay complete. Like the keys above, it's read from this
# workspace file on pnpm 10+, NOT the package.json "pnpm" key.
onlyBuiltDependencies:
  - "@electron/get"
  - better-sqlite3
  - electron
  - electron-winstaller
  - esbuild
  - onnxruntime-node
  - opensrc
  - protobufjs
  - sharp
  - workerd
