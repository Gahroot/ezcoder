packages:
  - "packages/*"
  - "Matey"
  - "ezcoder-app"
  - "experiments/*"

# pnpm 10+ reads these settings from pnpm-workspace.yaml, not the package.json
# "pnpm" key. They mirror that key so the committed lockfile stays reproducible
# under --frozen-lockfile (CI) and the ink patches actually apply on install.
overrides:
  global-agent: ^4.1.3
  ip-address: ^10.1.1

patchedDependencies:
  ink@7.0.2: patches/ink@7.0.2.patch

# Native deps allowed to run install scripts. pnpm 11 ERRORS
# (ERR_PNPM_IGNORED_BUILDS) when a dep wants to build but isn't approved — in v10
# it only warned. v11 replaced the v10 `onlyBuiltDependencies` list with the
# `allowBuilds` map; CI (CI=true) is non-interactive and obeys this map without
# prompting. Keep it complete or the frozen install fails before any build runs.
allowBuilds:
  "@electron/get": true
  better-sqlite3: true
  electron: true
  electron-winstaller: true
  esbuild: true
  onnxruntime-node: true
  opensrc: true
  protobufjs: true
  sharp: true
  workerd: true
