appId: com.kenkaiiii.matey
productName: Matey
directories:
  buildResources: build
files:
  - out/**
  - resources/**
  - package.json
asarUnpack:
  - resources/**
mac:
  category: public.app-category.productivity
  notarize: false
win:
  executableName: Matey
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
linux:
  target:
    - AppImage
    - deb
  category: Utility
npmRebuild: false
