<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&display=swap");
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1024px; height: 1024px; }
      .canvas {
        width: 1024px;
        height: 1024px;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Dark background with a subtle radial lift, matching the app shell (#111317). */
        background:
          radial-gradient(120% 120% at 30% 25%, #1b1f27 0%, #111317 55%, #0b0d11 100%);
      }
      .g {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-weight: 800;
        font-size: 118px;
        line-height: 1.0;
        white-space: pre;
        letter-spacing: 0;
        /* Brand gradient (blue -> periwinkle -> blue). */
        background: linear-gradient(135deg, #4d9dff 0%, #6f8ff7 45%, #9b8cf7 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        /* Soft glow so the glyph reads on the dark field at small sizes. */
        filter: drop-shadow(0 12px 40px rgba(108, 140, 247, 0.35));
      }
    </style>
  </head>
  <body>
    <div class="canvas">
<div class="g"> ██████╗ 
██╔════╝ 
██║  ███╗
██║   ██║
╚██████╔╝
 ╚═════╝ </div>
    </div>
  </body>
</html>
